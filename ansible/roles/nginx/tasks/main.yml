- name: Nginx installation, configuration, and hardening
  block:
    - name: Install Nginx
      ansible.builtin.apt:
        name: "{{ nginx_package }}"
        state: present

    - name: Install logrotate
      ansible.builtin.apt:
        name: logrotate
        state: present

    - name: Create basic Nginx configuration
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Remove default index.html
      ansible.builtin.file:
        path: /usr/share/nginx/html/index.html
        state: absent

    - name: Ensure systemd drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy systemd override for nginx hardening
      ansible.builtin.copy:
        dest: /etc/systemd/system/nginx.service.d/hardening.conf
        content: |
          [Unit]
          Description=Systemd override for hardened nginx

          [Service]
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE CAP_SETGID CAP_SETUID CAP_DAC_OVERRIDE CAP_KILL
          AmbientCapabilities=CAP_NET_BIND_SERVICE CAP_SETGID CAP_SETUID CAP_DAC_OVERRIDE CAP_KILL
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/log/nginx /var/cache/nginx /var/lib/nginx /run /var/www/certbot /etc/letsencrypt
          MemoryMax=768M
          CPUQuota=50%
          RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictNamespaces=true
          LockPersonality=true
          RestrictRealtime=true
          PrivateDevices=true
          SystemCallFilter=@system-service
          SystemCallErrorNumber=EPERM
        owner: root
        group: root
        mode: "0644"

    - name: Ensure /etc/nginx has restrictive permissions
      ansible.builtin.file:
        path: /etc/nginx
        owner: root
        group: root
        mode: "0750"
        recurse: true

    - name: Ensure /etc/nginx/ssl directory exists and is restrictive
      ansible.builtin.file:
        path: /etc/nginx/ssl
        owner: root
        group: root
        mode: "0750"
        state: directory

    - name: Ensure nginx log dir exists with correct ownership and permissions
      ansible.builtin.file:
        path: /var/log/nginx
        state: directory
        owner: www-data
        group: adm
        mode: "0750"
        recurse: true

    - name: Configure logrotate for nginx
      ansible.builtin.template:
        src: logrotate-nginx.j2
        dest: /etc/logrotate.d/nginx
        owner: root
        group: root
        mode: "0644"

    - name: Ensure nginx cache directory exists
      ansible.builtin.file:
        path: /var/cache/nginx/proxy
        state: directory
        owner: www-data
        group: www-data
        mode: "0750"
        recurse: true

    - name: Ensure custom proxy pass config directory exists
      ansible.builtin.file:
        path: /etc/nginx/conf.d/custom
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure directories under /etc/nginx have the correct permissions
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0755"
        state: directory
      loop:
        - /etc/nginx
        - /etc/nginx/conf.d
        - /etc/nginx/conf.d/custom

    - name: Ensure certbot webroot directory exists
      ansible.builtin.file:
        path: "{{ nginx_certbot_webroot }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure /etc/letsencrypt/live directory structure exists
      ansible.builtin.file:
        path: "/etc/letsencrypt/live/{{ fqdn }}/"
        owner: root
        group: root
        mode: "0750"
        state: directory
      when: fqdn is defined

    - name: Remove default site from sites-enabled
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

- name: Generate self-signed fallback certificates if no valid certs exist
  block:
    - name: Check if certificate file exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ fqdn }}/fullchain.pem"
      register: nginx_certbot_cert_stat
      when: fqdn is defined

    - name: Check if private key file exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ fqdn }}/privkey.pem"
      register: nginx_certbot_privkey_stat
      when: fqdn is defined

    - name: Generate self-signed private key if missing
      ansible.builtin.command:
        cmd: "openssl genrsa -out /etc/letsencrypt/live/{{ fqdn }}/privkey.pem 2048"
        creates: "/etc/letsencrypt/live/{{ fqdn }}/privkey.pem"
      when: fqdn is defined and not nginx_certbot_privkey_stat.stat.exists

    - name: Generate self-signed certificate if missing
      ansible.builtin.command:
        cmd: >
          openssl req -new -x509 -key /etc/letsencrypt/live/{{ fqdn }}/privkey.pem
          -out /etc/letsencrypt/live/{{ fqdn }}/fullchain.pem -days 365
          -subj "/CN={{ fqdn }}/O=Self-Signed/C=US"
        creates: "/etc/letsencrypt/live/{{ fqdn }}/fullchain.pem"
      when: fqdn is defined and not nginx_certbot_cert_stat.stat.exists

- name: Configure localhost status endpoint for nginx
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/status.conf
    content: |
      server {
          listen 127.0.0.1:8081;
          server_name localhost;

          location /metrics {
              stub_status on;
              access_log off;
              allow 127.0.0.1;
              deny all;
          }
      }
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Reload systemd and restart nginx to apply hardening
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    daemon_reload: true
    enabled: true

- name: Install prometheus-nginx-exporter
  ansible.builtin.apt:
    name: prometheus-nginx-exporter
    state: present
    update_cache: true

- name: Configure prometheus-nginx-exporter
  ansible.builtin.copy:
    dest: /etc/default/prometheus-nginx-exporter
    content: |
      ARGS="--nginx.scrape-uri=http://127.0.0.1:8081/metrics --web.listen-address=127.0.0.1:9113"
    owner: root
    group: root
    mode: "0644"
  notify: Restart prometheus-nginx-exporter

- name: Ensure prometheus-nginx-exporter service is enabled and started
  ansible.builtin.systemd:
    name: prometheus-nginx-exporter
    enabled: true
    state: started
